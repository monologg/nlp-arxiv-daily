user_name: "monologg"
repo_name: "nlp-arxiv-daily"
show_authors: True
show_links: True
show_badge: False
max_results: 10

publish_readme: True
publish_gitpage: True

# file paths
json_readme_path: "./docs/nlp-arxiv-daily.json"
json_gitpage_path: "./docs/nlp-arxiv-daily-web.json"

md_readme_path: "README.md"
md_gitpage_path: "./docs/index.md"

# archive (older months) — main JSON/README hold only the current calendar
# month; everything older lives under these dirs as YYYY-MM.{json,md}
archive_readme_json_dir: "./docs/archive"
archive_readme_md_dir: "./docs/archive"
archive_gitpage_json_dir: "./docs/archive-web"
archive_gitpage_md_dir: "./docs/archive-web"

# keywords to search
keywords:
  "NLP":
    filters: ["NLP", "Natural Language Processing"]
  "Legal NLP":
    filters: ["Legal NLP", "Legal Language", "Legal Text"]
  "Named Entity Recognition":
    filters: ["Named Entity Recognition"]
  "Text Classification":
    filters:
      [
        "Text Classification",
        "Topic Labeling",
        "News Classification",
        "Dialog Act Classification",
        "Natural Language Inference",
        "Relation Classification",
        "Event Prediction",
      ]
  "Sentiment Analysis":
    filters: ["Sentiment Analysis"]
  "Question Answering":
    filters: ["QA", "Question Answering"]
  "Information Extraction":
    filters:
      [
        "Information Extraction",
        "Automatic Summary",
        "Title Generation",
        "Event Extraction",
      ]
  "Recommendation System":
    filters: ["Recommendation System", "Semantic Matching", "Chatbots"]
  "Knowledge Graph":
    filters: ["Knowledge Graph", "Knowledge Graphs"]
  "GNN":
    filters: ["GNN", "Graph Neural Network"]

  # --- LLM-era tags (added 2026-04 to track post-ChatGPT research themes) ---

  "LLM":
    filters: ["Large Language Model", "Large Language Models", "LLM"]
  "LLM Agent":
    filters: ["LLM Agent", "Language Agent", "Autonomous Agent", "AI Agent", "Agentic"]
  "Multi-Agent":
    filters: ["Multi-Agent", "Multi Agent System", "Multi-Agent System"]
  "RAG":
    filters: ["Retrieval-Augmented Generation", "Retrieval Augmented Generation", "RAG"]
  "Reasoning":
    filters: ["LLM Reasoning", "Chain-of-Thought", "Chain of Thought", "Reasoning Model"]
  "Multimodal LLM":
    filters: ["Multimodal LLM", "Vision-Language Model", "Vision Language Model", "VLM", "MLLM"]
  "LLM Evaluation":
    filters: ["LLM Evaluation", "LLM Benchmark", "LLM-as-a-Judge", "LLM as a Judge"]

  "Alignment":
    filters: ["RLHF", "DPO", "Preference Learning", "LLM Alignment"]
  "Hallucination":
    filters: ["Hallucination", "Faithfulness", "Factuality"]
  "LLM Efficiency":
    filters: ["LoRA", "PEFT", "Parameter-Efficient Fine-Tuning", "Quantization"]
  "Long Context":
    filters: ["Long Context", "Long-Context"]
  "Code LLM":
    filters: ["Code Generation", "Code LLM", "Program Synthesis"]

  "Medical NLP":
    filters: ["Medical LLM", "Clinical NLP", "Biomedical NLP", "Clinical Language Model"]
  "Multilingual NLP":
    filters: ["Multilingual NLP", "Low-Resource Language", "Cross-Lingual"]
  "LLM Safety":
    filters: ["Jailbreak", "LLM Safety", "Red Teaming", "Adversarial Attack"]
  "Tool Use":
    filters: ["Tool Use", "Function Calling", "Tool-Augmented LLM"]
  "Speech LLM":
    filters: ["Speech Language Model", "Speech LLM", "Spoken Language Model"]
