name: Astro Build & Deploy

# Builds the Astro site under web/ and deploys to GitHub Pages.
#
# Triggers:
# - web/**            — frontend code or theme changes
# - docs/**.json      — cron-committed paper data the Astro build consumes
#                       (cron runs `python -m nlp_arxiv_daily run`, which
#                       writes the gitpage JSONs; this workflow then
#                       rebuilds + redeploys)
# - the workflow yaml — self-changes
#
# Repo Settings → Pages → Source must be set to "GitHub Actions" for the
# deploy job to publish.

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "docs/nlp-arxiv-daily-web.json"
      - "docs/archive-web/**.json"
      - ".github/workflows/astro-build.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/astro-build.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between
# the run in-progress and latest queued. However, do NOT cancel
# in-progress runs as we want to allow these production deployments
# to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NODE_ENV: production
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: deploy
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
