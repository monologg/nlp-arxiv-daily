name: Run Arxiv Papers Daily

on:
  workflow_dispatch:
  schedule:
    # Off-peak (avoid the top-of-hour herd of cron jobs that compete for
    # GH-Actions egress IPs and tend to trip arxiv's per-IP 429 throttle).
    - cron: "17 1,13 * * *"

env:
  GITHUB_USER_NAME: nlp-arxiv-daily-bot
  GITHUB_USER_EMAIL: nlp-arxiv-daily-bot@gmail.com

jobs:
  build:
    name: update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: make set-dev

      - name: Run daily arxiv
        run: uv run --frozen python -m nlp_arxiv_daily run

      - name: Push new nlp-arxiv-daily.md
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action Automatic Update NLP Arxiv Papers"
          # README.md is now a static project page (no auto-generated tables),
          # so we only commit the gitpage JSON files that Astro consumes.
          files: docs/nlp-arxiv-daily-web.json docs/archive-web
          rebase: "true"
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
